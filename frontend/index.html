<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 使用 loli.net 镜像（国内可访问的 Google Fonts 镜像） -->
    <link rel="preconnect" href="https://fonts.loli.net" />
    <link rel="preconnect" href="https://fonts.gstatic.loli.net" crossorigin />
    <!-- Inter: 现代无衬线字体，适合 UI -->
    <link
      href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- JetBrains Mono: 优秀的中英文等宽字体 -->
    <link
      href="https://fonts.loli.net/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Noto Sans SC: 思源黑体，优秀的中文字体 -->
    <link
      href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>PlotPilot · 墨枢 | 作者的领航员</title>
    <style>
      /* 首屏：在 JS/Vue 挂载前即可显示，避免桌面壳等后端时纯白窗口 */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: linear-gradient(160deg, #0f172a 0%, #1e293b 45%, #312e81 100%);
        color: #e2e8f0;
        font-family: system-ui, 'Segoe UI', 'Noto Sans SC', sans-serif;
        z-index: 2147483647;
      }
      #boot-splash .boot-logo {
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      #boot-splash .boot-hint {
        font-size: 0.875rem;
        color: #94a3b8;
      }
      #boot-splash .boot-spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(129, 140, 248, 0.25);
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: boot-spin 0.85s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-splash" aria-live="polite">
        <div class="boot-spinner" aria-hidden="true"></div>
        <div class="boot-logo">PlotPilot · 墨枢</div>
        <div class="boot-hint">正在启动本地服务，请稍候…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script><script src="/plugin-loader.js"></script>
  </body>
</html>
